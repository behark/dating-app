name: Backend Tests & API Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Run ESLint
        run: cd backend && npm run lint

      - name: Type checking
        run: cd backend && npm run type-check
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: Run Tests

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_DATABASE: dating-app-test

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Run backend tests
        run: cd backend && npm test -- --coverage
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/dating-app-test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          JWT_REFRESH_SECRET: test-refresh-secret-long-enough-for-validation
          HASH_SALT: test-hash-salt-long-enough
          ENCRYPTION_KEY: test-encryption-key-long-enough
          LOG_LEVEL: error

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

  api-check:
    runs-on: ubuntu-latest
    name: API Health Check

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Start backend server
        run: cd backend && npm start &
        env:
          NODE_ENV: test
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017/dating-app-test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          JWT_REFRESH_SECRET: test-refresh-secret-long-enough-for-validation
          HASH_SALT: test-hash-salt-long-enough
          ENCRYPTION_KEY: test-encryption-key-long-enough
          LOG_LEVEL: error

      - name: Wait for server
        run: sleep 5

      - name: Check health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$response" = "200" ]; then
            echo "✓ Health check passed"
          else
            echo "✗ Health check failed: $response"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    name: Security Check

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Run npm audit
        run: cd backend && npm audit --production
        continue-on-error: true

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/package.json
        continue-on-error: true

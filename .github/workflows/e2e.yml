name: E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'

jobs:
  e2e-web:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: E2E Tests - Web

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build frontend
        run: npm run vercel-build

      - name: Start backend server
        run: |
          cd backend && npm install && npm start &
        env:
          NODE_ENV: test
          PORT: 10000
          MONGODB_URI: mongodb://localhost:27017/dating-app-test
          JWT_SECRET: test-secret
          CORS_ORIGIN: http://localhost:3000

      - name: Wait for services
        run: |
          npx wait-on http://localhost:10000/health --timeout 30000
          npx wait-on http://localhost:3000 --timeout 30000 || true

      - name: Run Playwright tests
        run: npm run test:e2e:web
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  e2e-mobile:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: E2E Tests - Mobile
    continue-on-error: true

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend server
        run: |
          cd backend && npm install && npm start &
        env:
          NODE_ENV: test
          PORT: 10000
          MONGODB_URI: mongodb://localhost:27017/dating-app-test

      - name: Wait for backend
        run: npx wait-on http://localhost:10000/health --timeout 30000

      - name: Run mobile E2E tests
        run: npm run test:e2e:web:mobile
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-mobile-report
          path: playwright-report/
          retention-days: 30

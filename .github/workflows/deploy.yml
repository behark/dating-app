name: Deployment

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Pre-deployment Tests
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps && cd backend && npm ci --legacy-peer-deps && cd ..

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Run linting
        run: npm run lint

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Vercel
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: vercel/actions/cli@master
        with:
          args: --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend to Render
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Trigger Render deployment
        run: |
          curl -X POST \
            "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}" \
            -H "Content-Type: application/json"
        continue-on-error: true

  notify:
    runs-on: ubuntu-latest
    name: Deployment Notifications
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Deployment to ${{ github.ref }} - ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Create GitHub deployment status
        run: echo "Deployment complete"
